# Configuração local do Ansible para o lab (evita workers mortos em forks / pipelining).
# Ver também Makefile: ANSIBLE_FORKS, ANSIBLE_CONFIG.

[defaults]
forks = 1
gather_timeout = 120
timeout = 60

[ssh_connection]
# Pipelining + become em alguns controladores (Cursor/fork) → "worker dead"; o inventário `vms` usa paramiko.
pipelining = False
# SFTP + forks em alguns ambientes → "worker dead"; scp costuma ser mais estável no lab.
ssh_transfer_method = scp
