# Configuração local do Ansible para o lab (evita workers mortos em forks / pipelining).
# Controller: sempre `make` / `uv run` na raiz (pyproject.toml → .venv).
# VMs (grupo vms): interpreter_python descobre o Python do SO no alvo.
# Ver também Makefile: ANSIBLE_FORKS, ANSIBLE_CONFIG.

[defaults]
forks = 1
gather_timeout = 120
timeout = 60
interpreter_python = auto_silent
transport = ssh

[ssh_connection]
# OpenSSH (ansible_connection=ssh) pode rebentar com "worker dead" no terminal do Cursor.
pipelining = False
ssh_transfer_method = scp

[libssh_connection]
# Grupo vms: ansible.netcommon.libssh + ansible-pylibssh (sem fork do binário ssh).
host_key_auto_add = True
host_key_checking = False
look_for_keys = False
