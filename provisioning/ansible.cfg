# =============================================================================
# ansible.cfg — Local Ansible settings for the Broetec lab
# =============================================================================
#
# Purpose
#   Stable playbook runs from make/uv (integrated terminals, VM SSH via libssh).
#
# Controller
#   Always run from repo root: make <target> or uv run ansible-playbook.
#   ANSIBLE_CONFIG=provisioning/ansible.cfg (Makefile). Python: project .venv.
#
# [defaults]
#   forks = 1           — avoids "worker dead" between plays in Cursor/AppImage.
#   gather_timeout = 120
#   timeout = 60
#   interpreter_python = auto_silent — target Python on vms (guest OS).
#   transport = ssh       — default; vms use ansible.netcommon.libssh from inventory.
#
# [ssh_connection] — OpenSSH fallback (ANSIBLE_VM_CONNECTION=ssh in env/.env)
#   Tuned for fragile controllers (Cursor/VS Code terminal, sandboxed CI, AppImage):
#   long-lived SSH channels can kill workers → "A worker was found in a dead state".
#   pipelining = False — one round-trip per task, no persistent channel.
#   ssh_transfer_method = scp — reliable file copy in minimal/sandbox OpenSSH builds.
#
# [libssh_connection] — default for vms (ansible.netcommon.libssh; needs make deps)
#   Python sshd client instead of forking /usr/bin/ssh — fewer sandbox/fork issues.
#   ssh_common_args: -C (compress); ControlMaster/Persist=no — no shared SSH sockets
#   that go stale when the IDE terminal or parent process exits abruptly.
#
# Overrides
#   ANSIBLE_FORKS in Makefile may raise forks for specific targets.
#   ANSIBLE_VM_CONNECTION=ssh in env/.env — regenerate inventory to use OpenSSH.
#
# Related
#   provisioning/collections/README.md, make/ansible.mk, inventory/manifest.yml
# =============================================================================

[defaults]
forks = 1
gather_timeout = 120
timeout = 60
interpreter_python = auto_silent
transport = ssh

[ssh_connection]
pipelining = False
ssh_transfer_method = scp

[libssh_connection]
host_key_auto_add = True
host_key_checking = False
look_for_keys = False
ssh_common_args = -C -o ControlMaster=no -o ControlPersist=no
