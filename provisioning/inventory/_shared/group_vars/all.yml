---
# =============================================================================
# Shared global variables — all Broetec overlays
# =============================================================================
# Consumed by roles 00_install_kvm, 01_create_vm (KVM host) and 02_prepare_vm (VMs).
# Each overlay links group_vars/all/00_shared.yml → this file via make inventory.
# Override per overlay in 90_local.yml or host vars in hosts.ini.
# =============================================================================

# -----------------------------------------------------------------------------
# Base domain
# -----------------------------------------------------------------------------
# Broetec uses local.broetec.com.br for lab FQDNs, e.g.
# broetec-core.local.broetec.com.br.
base_domain: local.broetec.com.br

# Repository root (hosts.ini lives under provisioning/inventory/<overlay>/).
_repo_root: "{{ inventory_dir | dirname | dirname | dirname }}"

# -----------------------------------------------------------------------------
# KVM host bootstrap
# -----------------------------------------------------------------------------
# When true (default), role 00_install_kvm installs qemu-kvm/libvirt/etc. and
# enables libvirtd. On immutable distros (Bazzite, Silverblue, Kinoite) or when
# KVM is already ready, set false so the playbook does not touch host packages.
# Via Make: prefer KVM_HOST_BOOTSTRAP=false in env/.env (--skip-tags bootstrap).
kvm_host_bootstrap: true

# -----------------------------------------------------------------------------
# VM defaults
# -----------------------------------------------------------------------------
# Override per host in hosts.ini (e.g. vm_vcpus=8) or in 90_local.yml.
vm_defaults:
  vcpus: 4
  memory_mb: 8192
  disk_size_gb: 60
  # libosinfo id (virt-install --osinfo list | grep -i rocky).
  # Use rocky10, not rocky10.0 — Rocky 10 only publishes major version.
  # Older hosts: rocky9.0, rhel9.2, etc.
  os_variant: rocky10
  network_iface_model: virtio

# -----------------------------------------------------------------------------
# libvirt network — 10.20.30.0/24 avoids collision with home routers
# (typically 192.168.0.x or 192.168.1.x).
# -----------------------------------------------------------------------------
kvm_network:
  name: broetec-lab
  bridge: virbr-broetec
  subnet_cidr: 10.20.30.0/24
  netmask: 255.255.255.0
  prefix: 24
  gateway: 10.20.30.1
  dhcp_start: 10.20.30.100
  dhcp_end: 10.20.30.200
  dns_servers:
    - 1.1.1.1
    - 8.8.8.8
  domain: "{{ base_domain }}"

# Host KVM firewall (opt-in via Make): KVM_HOST_FIREWALL=true in env/.env
# applies NAT/FORWARD rules when firewalld, ufw, or iptables FORWARD DROP is active.

# -----------------------------------------------------------------------------
# libvirt storage (inside repo — disposable lab/)
# -----------------------------------------------------------------------------
# VM disks, seed ISOs, and base qcow2 cache live under lab/ (gitignored).
# make clean removes VM/network and lab/; see lab/README.md.
# Makefile may override via -e lab_disks_path / lab_cache_dir.
libvirt_pool:
  name: k8s-blueprint-lab
  path: "{{ lab_disks_path | default(_repo_root ~ '/lab/disks', true) }}"

# -----------------------------------------------------------------------------
# Base cloud image — Rocky Linux qcow2
# -----------------------------------------------------------------------------
# Downloaded once to cache_dir and cloned per VM.
# Rocky 10 publishes -Base suffix (Rocky-10-GenericCloud-Base.latest.x86_64.qcow2).
#   https://dl.rockylinux.org/pub/rocky/<version>/images/x86_64/
os_image:
  distribution: rocky
  version: "10"
  filename: Rocky-10-GenericCloud-Base.latest.x86_64.qcow2
  url: https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base.latest.x86_64.qcow2
  checksum_url: https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base.latest.x86_64.qcow2.CHECKSUM
  cache_dir: "{{ lab_cache_dir | default(_repo_root ~ '/lab/cache', true) }}"

# -----------------------------------------------------------------------------
# Lab SSH key (explicit name: k8s-blueprint in env/)
# -----------------------------------------------------------------------------
# Files at <repo>/env/k8s-blueprint and .pub, created by make keys / make up.
# Makefile may override paths via -e.
#
# Manual generation at repo root:
#   ssh-keygen -t ed25519 -C "k8s-blueprint" -f env/k8s-blueprint -N ""
#
# Custom key in your overlay:
#   ssh_public_key_path: "{{ lookup('env', 'HOME') ~ '/.ssh/id_rsa.pub' }}"
ssh_public_key_path: "{{ _repo_root }}/env/k8s-blueprint.pub"
ansible_ssh_private_key_file: "{{ _repo_root }}/env/k8s-blueprint"

# -----------------------------------------------------------------------------
# cloud-init — user, timezone, locale, SSH keys, optional password
# -----------------------------------------------------------------------------
cloud_init:
  default_user: broetec
  timezone: America/Sao_Paulo
  locale: en_US.UTF-8
  ssh_authorized_keys:
    - "{{ lookup('file', ssh_public_key_path) }}"
  # Password: broetec
  # Generate hash: openssl passwd -6   or   mkpasswd --method=SHA-512
  password_hash: '$6$EzA6FoPmrHWE/XXL$toMAlFTNt9t1U/ys2orLE2tj66mE/W/5N7x./PA0AunILctST8AX5M9Cpzsnb1t4yWgMb2H9USjaE2qaTfQ9B/'
  ssh_password_login: false
  # true = convenient lab (Ansible become without VM password).
  # false = sudo prompts for password; set password_hash and ansible_become_password
  # in group_vars/vms.yml.
  sudo_nopasswd: true
