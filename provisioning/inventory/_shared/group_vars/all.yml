---
# =============================================================================
# Variáveis globais partilhadas — todos os overlays Broetec
# =============================================================================
# Consumidas pelas roles kvm_vm (host KVM) e os_prepare (VMs).
# Cada overlay em provisioning/inventory/<nome>/ liga group_vars -> _shared.
# Sobrescreva por overlay com group_vars/all.yml local (opcional).
# =============================================================================

# -----------------------------------------------------------------------------
# Domínio base
# -----------------------------------------------------------------------------
# A Broetec possui o domínio `local.broetec.com.br` apontando (via DNS)
# para o IP de teste do laboratório local. As VMs ganham FQDN do tipo
# `broetec-core.local.broetec.com.br`.
base_domain: local.broetec.com.br

# Raiz do repositório (hosts.ini está em provisioning/inventory/<overlay>/).
_repo_root: "{{ inventory_dir | dirname | dirname | dirname }}"

# -----------------------------------------------------------------------------
# Bootstrap do host KVM
# -----------------------------------------------------------------------------
# Quando `true` (padrão), a role `kvm_vm` instala qemu-kvm/libvirt/etc. e
# habilita o serviço libvirtd no host. Em distros imutáveis (Bazzite,
# Silverblue, Kinoite) ou em hosts onde o KVM já está pronto, defina como
# `false` para que o playbook NÃO toque na configuração do host.
# Equivalente a rodar com `--skip-tags bootstrap`.
kvm_host_bootstrap: true

# -----------------------------------------------------------------------------
# Defaults da VM
# -----------------------------------------------------------------------------
# Podem ser sobrescritos por host na `hosts.ini` (ex.: vm_vcpus=8).
vm_defaults:
  vcpus: 4
  memory_mb: 8192
  disk_size_gb: 60
  # id curto do libosinfo (virt-install --osinfo list | grep -i rocky).
  # Use `rocky10`, não `rocky10.0` — só existe o major em RL10.
  # Em hosts antigos: `rocky9.0`, `rhel9.2`, etc.
  os_variant: rocky10
  network_iface_model: virtio

# -----------------------------------------------------------------------------
# Rede libvirt — usamos a subrede 10.20.30.0/24 deliberadamente
# para evitar colisão com roteadores domésticos (que normalmente usam
# 192.168.0.x ou 192.168.1.x).
# -----------------------------------------------------------------------------
kvm_network:
  name: broetec-lab
  bridge: virbr-broetec
  subnet_cidr: 10.20.30.0/24
  netmask: 255.255.255.0
  prefix: 24
  gateway: 10.20.30.1
  dhcp_start: 10.20.30.100
  dhcp_end: 10.20.30.200
  dns_servers:
    - 1.1.1.1
    - 8.8.8.8
  domain: "{{ base_domain }}"

# Firewalld no host KVM: regras de forward/NAT para VMs (necessário com Docker no mesmo host).
kvm_network_firewalld: true

# -----------------------------------------------------------------------------
# Armazenamento libvirt (dentro do repositório — lab descartável)
# -----------------------------------------------------------------------------
# Discos das VMs, seed ISOs e cache da qcow2 base ficam em lab/ (gitignored).
# `make clean` remove a VM/rede e apaga lab/; ver lab/README.md.
# O Makefile pode sobrepor via -e lab_disks_path / lab_cache_dir.
libvirt_pool:
  name: k8s-blueprint-lab
  path: "{{ lab_disks_path | default(_repo_root ~ '/lab/disks', true) }}"

# -----------------------------------------------------------------------------
# Imagem base (cloud image) — Rocky Linux qcow2
# -----------------------------------------------------------------------------
# A imagem é baixada uma única vez para `cache_dir` e clonada por VM.
# Atenção: a partir do Rocky 10 o nome publicado tem o sufixo `-Base`
# (`Rocky-10-GenericCloud-Base.latest.x86_64.qcow2`). O Rocky 9 ainda
# mantinha o nome legacy sem sufixo. Confira em:
#   https://dl.rockylinux.org/pub/rocky/<versao>/images/x86_64/
os_image:
  distribution: rocky
  version: "10"
  filename: Rocky-10-GenericCloud-Base.latest.x86_64.qcow2
  url: https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base.latest.x86_64.qcow2
  checksum_url: https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base.latest.x86_64.qcow2.CHECKSUM
  cache_dir: "{{ lab_cache_dir | default(_repo_root ~ '/lab/cache', true) }}"

# -----------------------------------------------------------------------------
# Chave SSH do laboratório (nome explícito: k8s-blueprint em env/)
# -----------------------------------------------------------------------------
# Os ficheiros ficam em `<repo>/env/k8s-blueprint` e `.pub`, gerados por
# `make keys` / `make up`. O `Makefile` pode sobrescrever estes caminhos via `-e`.
#
# Para gerar manualmente na raiz do repositório:
#   ssh-keygen -t ed25519 -C "k8s-blueprint" -f env/k8s-blueprint -N ""
#
# Para usar outra chave, sobrescreva no seu overlay:
#   ssh_public_key_path: "{{ lookup('env', 'HOME') ~ '/.ssh/id_rsa.pub' }}"
ssh_public_key_path: "{{ _repo_root }}/env/k8s-blueprint.pub"
ansible_ssh_private_key_file: "{{ _repo_root }}/env/k8s-blueprint"

# -----------------------------------------------------------------------------
# cloud-init — utilizador rocky, fuso, locale, chaves SSH e (opcional) senha
# -----------------------------------------------------------------------------
cloud_init:
  default_user: rocky
  timezone: America/Sao_Paulo
  locale: en_US.UTF-8
  ssh_authorized_keys:
    - "{{ lookup('file', ssh_public_key_path) }}"
  # Password: broetec@lab
  # Generate hash: openssl passwd -6   or   mkpasswd --method=SHA-512
  password_hash: '$6$jNrlQDFy.2XhFEy4$lxI3Dr4ceWoc6mIKJ4z9QJKqMNCQ5u7OU9i92p5aPNBHGw23teJqlkonrdkxvJLNrRKXWOo3lgLk/hngjAKCG0'
  ssh_password_login: false
  # true = lab conveniente (Ansible become sem senha na VM). false = sudo pede senha;
  # nesse caso define password_hash (consola) e ansible_become_password em group_vars/vms.yml.
  sudo_nopasswd: true
