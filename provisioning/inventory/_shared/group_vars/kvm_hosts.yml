---
# Play local (kvm_hosts): módulos no mesmo Python que `uv run ansible-playbook` (.venv).
ansible_python_interpreter: "{{ ansible_playbook_python }}"

# Conta do operador no host KVM (lab/, grupos libvirt/kvm). Não confundir com ansible_user das VMs.
kvm_host_libvirt_user: "{{ lookup('env', 'USER') }}"
