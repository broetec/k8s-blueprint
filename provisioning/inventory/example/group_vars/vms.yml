---
# =============================================================================
# Variáveis só para o grupo `vms` (VMs Rocky por SSH)
# =============================================================================
# Se em all.yml tiveres `cloud_init.sudo_nopasswd: false`, o `sudo` na VM exige a
# palavra-passe do utilizador rocky (a mesma em claro que usaste para gerar
# `password_hash`). O Ansible precisa dela para `become` — não há “magia”: vens
# tu com uma fonte segura (ficheiro local, vault, ou variável de ambiente).
#
# Opção A — ficheiro local (gitignored), uma linha = senha do rocky:
#   printf '%s\n' 'a_tua_senha' > env/vm-rocky.pass && chmod 600 env/vm-rocky.pass
#   Descomenta a linha abaixo.
#
# Opção B — Ansible Vault (recomendado se versionas inventário):
#   ansible-vault create group_vars/vms_vault.yml   # ansible_become_password: '...'
#   e inclui o vault no playbook ou com --vault-id
#
# ansible_become_password: "{{ lookup('file', _repo_root ~ '/env/vm-rocky.pass') | trim }}"

vms_group_vars_docs: true
