; =============================================================================
; Inventário Ansible — overlay "example" (Reference Architecture / Broetec)
; =============================================================================
; Este overlay é a referência arquitetural oficial. Não edite-o no seu
; ambiente local: copie a pasta inteira para criar o seu próprio overlay,
; que ficará fora do versionamento (ver .gitignore):
;
;   cp -r provisioning/inventory/example provisioning/inventory/meu-ambiente
;   $EDITOR provisioning/inventory/meu-ambiente/hosts.ini
;
; Estrutura:
;   - kvm_hosts : máquina física onde corre o libvirt (executa as tasks
;                 da role kvm_vm). Por padrão é o próprio host local.
;   - vms       : VMs que serão criadas e preparadas (role os_prepare).
; =============================================================================

[kvm_hosts]
localhost ansible_connection=local

[vms]
node-01 ansible_host=10.20.30.40 vm_ip=10.20.30.40

[vms:vars]
ansible_user=rocky
; Chave SSH: caminho em group_vars/all.yml (`env/k8s-blueprint`). `make up`
; sobrescreve via -e se necessário.
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
