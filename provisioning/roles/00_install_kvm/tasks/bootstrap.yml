---
# Host bootstrap (tag bootstrap): install KVM/libvirt packages and start libvirtd.
# Skip on immutable distros or when the host already has libvirt.
#
# With make: KVM_HOST_BOOTSTRAP=false in env/.env (see make/config.mk, make/ansible.mk).
# With ansible-playbook only: -e kvm_host_bootstrap=false and/or --skip-tags bootstrap.
# Tasks honor kvm_host_bootstrap (defaults in defaults/main.yml).

- name: Install KVM/libvirt packages on the host
  ansible.builtin.package:
    name:
      - qemu-kvm
      - libvirt
      - libvirt-client
      - virt-install
      - libguestfs-tools
      - genisoimage
      - xorriso
    state: present
  when: kvm_host_bootstrap | default(true) | bool
  tags: [bootstrap, install]

- name: Ensure libvirtd is enabled and running
  ansible.builtin.service:
    name: libvirtd
    state: started
    enabled: true
  when: kvm_host_bootstrap | default(true) | bool
  tags: [bootstrap, install]
