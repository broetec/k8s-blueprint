---
# Optional bootstrap: on immutable distros or pre-configured hosts, use
# kvm_host_bootstrap: false or --skip-tags bootstrap.

- name: Install KVM/libvirt packages on the host
  ansible.builtin.package:
    name:
      - qemu-kvm
      - libvirt
      - libvirt-client
      - virt-install
      - libguestfs-tools
      - genisoimage
      - xorriso
    state: present
  when: kvm_host_bootstrap | default(true) | bool
  tags: [bootstrap, install]

- name: Ensure libvirtd is enabled and running
  ansible.builtin.service:
    name: libvirtd
    state: started
    enabled: true
  when: kvm_host_bootstrap | default(true) | bool
  tags: [bootstrap, install]
