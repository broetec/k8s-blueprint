---
# =============================================================================
# tasks/firewall/detect.yml — Select host firewall backend
# =============================================================================
#
# Purpose
#   Probe the KVM host and set kvm_firewall_backend for downstream tasks.
#
# Pipeline
#   Priority: firewalld (active) → ufw (active + Status active) → iptables
#   (FORWARD policy DROP) → none.
#
# Variables
#   kvm_firewall_backend (fact set by this file).
#
# Related commands
#   make install-kvm KVM_HOST_FIREWALL=true
# =============================================================================

- name: Detect whether firewalld is active on the KVM host
  ansible.builtin.command: systemctl is-active firewalld
  register: kvm_fw_firewalld_active
  changed_when: false
  failed_when: false

- name: Detect whether ufw service is active on the KVM host
  ansible.builtin.command: systemctl is-active ufw
  register: kvm_fw_ufw_service
  changed_when: false
  failed_when: false

- name: Check ufw runtime status when ufw service is active
  ansible.builtin.command: ufw status
  register: kvm_fw_ufw_status
  changed_when: false
  failed_when: false
  when: kvm_fw_ufw_service.stdout | trim == 'active'

- name: Inspect iptables FORWARD chain policy for lab rule dispatch
  ansible.builtin.command: iptables -L FORWARD -n
  register: kvm_fw_forward_chain
  changed_when: false
  failed_when: false

- name: Set kvm_firewall_backend from detect probes (firewalld, ufw, iptables, or none)
  ansible.builtin.set_fact:
    kvm_firewall_backend: >-
      {{
        'firewalld' if (kvm_fw_firewalld_active.stdout | trim == 'active')
        else (
          'ufw' if (
            kvm_fw_ufw_service.stdout | trim == 'active'
            and ('Status: active' in (kvm_fw_ufw_status.stdout | default('')))
          )
          else (
            'iptables' if (
              'policy DROP' in (kvm_fw_forward_chain.stdout | default(''))
            )
            else 'none'
          )
        )
      }}
