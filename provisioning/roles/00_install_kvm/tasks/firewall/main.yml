---
# =============================================================================
# tasks/firewall/main.yml — Host firewall entry for lab VM egress
# =============================================================================
#
# Purpose
#   Detect the active firewall backend and import exactly one implementation
#   so VMs on kvm_network.subnet_cidr can reach the internet (NAT/FORWARD).
#
# Scope
#   Runs only when kvm_host_firewall is true (imported from main.yml).
#   Sets kvm_firewall_backend via detect.yml; dispatches to one backend file.
#
# Variables
#   kvm_host_firewall, kvm_network.subnet_cidr, kvm_network.bridge.
#
# Related commands
#   make install-kvm KVM_HOST_FIREWALL=true
# =============================================================================

- name: Detect active firewall backend on the KVM host
  ansible.builtin.import_tasks: detect.yml

- name: Apply firewalld lab NAT and FORWARD rules
  ansible.builtin.import_tasks: firewalld.yml
  when: kvm_firewall_backend == 'firewalld'

- name: Apply ufw lab NAT and FORWARD rules
  ansible.builtin.import_tasks: ufw.yml
  when: kvm_firewall_backend == 'ufw'

- name: Apply iptables lab NAT and FORWARD rules
  ansible.builtin.import_tasks: iptables.yml
  when: kvm_firewall_backend == 'iptables'

- name: Skip host firewall rules — no supported active backend detected
  ansible.builtin.debug:
    msg: >-
      kvm_host_firewall=true but no supported active firewall was detected
      (firewalld, ufw, or iptables with FORWARD policy DROP). Skipping host
      firewall rules; lab VMs may not reach the internet on Docker hosts.
  when: kvm_firewall_backend == 'none'
