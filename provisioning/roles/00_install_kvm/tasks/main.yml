---
# =============================================================================
# roles/00_install_kvm/tasks/main.yml
# =============================================================================
# Prepares the physical KVM/libvirt host before 01_create_vm:
#
#   1. Optional bootstrap — packages + libvirtd (tag bootstrap).
#   2. Libvirt NAT network + DHCP reservations by MAC.
#   3. Optional host firewall — NAT/forward for lab VMs (firewalld, ufw, iptables).
#
# Prerequisite for 01_create_vm: virsh, virt-install, qemu-img, genisoimage|xorriso
# on PATH (bootstrap installs them when kvm_host_bootstrap: true).
# =============================================================================

- name: Bootstrap KVM host (packages and libvirtd)
  ansible.builtin.import_tasks: bootstrap.yml

- name: Libvirt network and DHCP reservations
  ansible.builtin.import_tasks: network.yml
  tags: [install_kvm]

- name: Host firewall — NAT/forward for lab VMs
  ansible.builtin.import_tasks: firewall/main.yml
  when: kvm_host_firewall | default(false) | bool
  tags: [install_kvm]
