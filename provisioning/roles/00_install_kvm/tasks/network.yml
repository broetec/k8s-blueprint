---
# =============================================================================
# tasks/network.yml — Shared libvirt NAT network for the lab
# =============================================================================
#
# Purpose
#   Define and maintain one persistent libvirt virtual network (default:
#   broetec-lab / virbr-broetec) used by all lab VMs across overlays.
#
# Scope
#   Host-side L3 only: NAT, bridge, gateway, and a shared DHCP pool
#   (kvm_network.dhcp_start … dhcp_end). Per-VM addresses are applied inside
#   the guest by role 01_create_vm (network-config on the NoCloud seed ISO;
#   see provisioning/templates/network-config.j2).
#
# Inventory variables (group_vars/all.yml → kvm_network)
#   name, bridge, gateway, netmask, dhcp_start, dhcp_end, domain (DNS domain
#   for libvirt internal resolver), subnet_cidr (used by firewall tasks).
#
# Extra variables
#   kvm_network_force_restart — set true by `make network-refresh` to
#   net-destroy + net-start even when the fingerprint is unchanged.
#
# Pipeline (high level)
#   1. Snapshot whether the network is already active (for start vs restart).
#   2. Preserve existing network UUID when re-defining (libvirt requirement).
#   3. Render desired XML to /tmp and compute a logical fingerprint.
#   4. Compare with inactive persistent XML; net-define only if new/changed.
#   5. autostart + start if down; destroy+start if definition changed or forced.
#
# Fingerprint (why shell + grep)
#   virsh net-define is not idempotent for running dnsmasq: we hash only the
#   operational knobs (forward, bridge, domain, gateway, DHCP range) so cosmetic
#   XML differences or UUID lines do not spuriously trigger a restart.
#
# Related commands
#   make install-kvm          — apply this file (tag install_kvm)
#   make network-refresh      — same with kvm_network_force_restart=true
#
# Manual checks
#   virsh -c qemu:///system net-dumpxml broetec-lab
#   virsh -c qemu:///system net-info broetec-lab
# =============================================================================

# --- 1. Runtime state (before any mutation) -----------------------------------
- name: List active libvirt networks (initial state, before net-define)
  ansible.builtin.command: virsh -c qemu:///system net-list --name
  register: libvirt_active_nets_initial
  changed_when: false
  check_mode: false

# --- 2. Stable identity (UUID must survive net-define updates) ----------------
- name: Look up UUID of network {{ kvm_network.name }} (if already defined)
  ansible.builtin.shell: |
    set -euo pipefail
    virsh -c qemu:///system net-info "{{ kvm_network.name }}" 2>/dev/null | awk '/^UUID:/ { print $2 }'
  args:
    executable: /bin/bash
  register: kvm_network_uuid_lookup
  changed_when: false
  failed_when: false

# --- 3. Desired network definition (NAT + shared DHCP pool) -------------------
- name: Render libvirt network XML for {{ kvm_network.name }}
  ansible.builtin.copy:
    dest: "/tmp/libvirt-net-{{ kvm_network.name }}.xml"
    mode: "0644"
    content: |
      <network>
        {% if kvm_network_uuid_lookup.stdout | trim | length > 0 %}
        <uuid>{{ kvm_network_uuid_lookup.stdout | trim }}</uuid>
        {% endif %}
        <name>{{ kvm_network.name }}</name>
        <forward mode='nat'/>
        <bridge name='{{ kvm_network.bridge }}' stp='on' delay='0'/>
        <domain name='{{ kvm_network.domain }}' localOnly='yes'/>
        <ip address='{{ kvm_network.gateway }}' netmask='{{ kvm_network.netmask }}'>
          <dhcp>
            <range start='{{ kvm_network.dhcp_start }}' end='{{ kvm_network.dhcp_end }}'/>
          </dhcp>
        </ip>
      </network>

# --- 4. Change detection (wanted vs persistent inactive XML) ------------------
- name: Compute desired network XML fingerprint (/tmp target file)
  ansible.builtin.shell: |-
    {% raw %}
    set -euo pipefail
    f="/tmp/libvirt-net-${KVM_NET_NAME}.xml"
    _fp_stream() {
      sed "s/\"/'/g" | {
        grep -oE "<forward[^/>]*/>" || true
        grep -oE "<bridge[^/>]*/>" || true
        grep -oE "<domain[^/>]*/>" || true
        grep -oE "<ip address='[^']+' netmask='[^']+'>" || true
        grep -oE "<range start='[^']+' end='[^']+'/>" || true
      } | sha256sum | awk '{print $1}'
    }
    _fp_stream < "$f"
    {% endraw %}
  environment:
    KVM_NET_NAME: "{{ kvm_network.name }}"
  args:
    executable: /bin/bash
  register: kvm_net_fp_wanted
  changed_when: false

- name: Compute current persistent network XML fingerprint (before net-define)
  ansible.builtin.shell: |-
    {% raw %}
    set -euo pipefail
    name="${KVM_NET_NAME}"
    if ! virsh -c qemu:///system net-info "$name" &>/dev/null; then
      echo "__NETWORK_ABSENT__"
      exit 0
    fi
    _fp_stream() {
      sed "s/\"/'/g" | {
        grep -oE "<forward[^/>]*/>" || true
        grep -oE "<bridge[^/>]*/>" || true
        grep -oE "<domain[^/>]*/>" || true
        grep -oE "<ip address='[^']+' netmask='[^']+'>" || true
        grep -oE "<range start='[^']+' end='[^']+'/>" || true
      } | sha256sum | awk '{print $1}'
    }
    virsh -c qemu:///system net-dumpxml --inactive "$name" | _fp_stream
    {% endraw %}
  environment:
    KVM_NET_NAME: "{{ kvm_network.name }}"
  args:
    executable: /bin/bash
  register: kvm_net_fp_current
  changed_when: false

- name: Determine whether libvirt network runtime must refresh (changed or forced)
  ansible.builtin.set_fact:
    kvm_libvirt_net_runtime_needs_refresh: >-
      {{
        (kvm_net_fp_wanted.stdout | trim != kvm_net_fp_current.stdout | trim)
        or (kvm_network_force_restart | default(false) | bool)
      }}

# --- 5. Apply persistent definition -------------------------------------------
- name: Define or update libvirt network (persistent; only if logical XML changed or new)
  ansible.builtin.command: >-
    virsh -c qemu:///system net-define
    /tmp/libvirt-net-{{ kvm_network.name }}.xml
  when: >-
    (kvm_net_fp_current.stdout | trim == "__NETWORK_ABSENT__")
    or (kvm_net_fp_wanted.stdout | trim != kvm_net_fp_current.stdout | trim)

- name: Enable libvirt network autostart
  ansible.builtin.command: virsh -c qemu:///system net-autostart {{ kvm_network.name }}
  changed_when: false

# --- 6. Bring network up (cold start vs reload running instance) --------------
- name: Start libvirt network if not already active
  ansible.builtin.command: virsh -c qemu:///system net-start {{ kvm_network.name }}
  when: kvm_network.name not in libvirt_active_nets_initial.stdout_lines

- name: Restart network {{ kvm_network.name }} (only if base XML changed or forced)
  ansible.builtin.shell: |
    set -euo pipefail
    virsh -c qemu:///system net-destroy "{{ kvm_network.name }}" 2>/dev/null || true
    virsh -c qemu:///system net-start "{{ kvm_network.name }}"
  args:
    executable: /bin/bash
  when:
    - kvm_network.name in libvirt_active_nets_initial.stdout_lines
    - kvm_libvirt_net_runtime_needs_refresh | bool
