---
# =============================================================================
# tasks/main.yml — Role 01 entrypoint (libvirt VM provisioning)
# =============================================================================
#
# Purpose
#   Clone Rocky cloud images, build NoCloud seed ISOs, and run virt-install
#   for each host in groups['vms'] after role 00 (or equivalent host prep).
#
# Pipeline
#   1. preflight.yml — SSH key, vm_mac in inventory, virt-install on PATH.
#   2. image_cache.yml — lab dirs + download base qcow2.
#   3. provision.yml — clone, cloud-init, virt-install, MAC assert.
#   4. wait_ssh.yml — wait for port 22 on each VM.
#
# Variables
#   Inventory: vm_ip, vm_mac, vm_defaults, os_image, libvirt_pool, kvm_network.
#   Role defaults: create_vm_ssh_wait_* (defaults/main.yml).
#
# Related commands
#   make create-vm, make up
# =============================================================================

- name: Preflight — SSH key, inventory MACs, virt-install
  ansible.builtin.import_tasks: preflight.yml
  tags: [create_vm]

- name: Image cache — lab directories and Rocky qcow2 download
  ansible.builtin.import_tasks: image_cache.yml
  tags: [create_vm]

- name: Provision — clone disks, cloud-init, virt-install
  ansible.builtin.import_tasks: provision.yml
  tags: [create_vm]

- name: Wait for SSH on each VM
  ansible.builtin.import_tasks: wait_ssh.yml
  tags: [create_vm]
