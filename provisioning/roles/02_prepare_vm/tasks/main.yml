---
# =============================================================================
# tasks/main.yml — Role 02 entrypoint (VM OS baseline)
# =============================================================================
#
# Purpose
#   Prepare Rocky Linux inside each VM (groups['vms']) for later k8s roles:
#   swap off, SELinux, firewalld baseline. Does not install platform software.
#
# Pipeline
#   1. preflight.yml — SSH ping without become; primary NIC fact.
#   2. cloud_init.yml — wait for cloud-init.
#   3. swap.yml — swapoff + /etc/fstab.
#   4. selinux.yml — SELINUX mode.
#   5. firewalld.yml — package, zone, ssh, icmp.
#
# Variables
#   prepare_vm_selinux_mode, prepare_vm_firewalld_zone (defaults/main.yml).
#
# Related commands
#   make prepare-vm, make up
# =============================================================================

- name: Preflight — SSH connectivity and host facts
  ansible.builtin.import_tasks: preflight.yml
  tags: [prepare_vm]

- name: Cloud-init — wait for first-boot configuration
  ansible.builtin.import_tasks: cloud_init.yml
  tags: [prepare_vm]

- name: Swap — disable runtime and persist in fstab
  ansible.builtin.import_tasks: swap.yml
  tags: [prepare_vm]

- name: SELinux — set lab mode
  ansible.builtin.import_tasks: selinux.yml
  tags: [prepare_vm]

- name: Firewalld — baseline zone and services
  ansible.builtin.import_tasks: firewalld.yml
  tags: [prepare_vm]
