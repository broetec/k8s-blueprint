---
# =============================================================================
# tasks/config.yml — write k3s config.yaml
# =============================================================================
#
# Purpose
#   Render and deploy /etc/rancher/k3s/config.yaml with node identity,
#   networking (flannel backend, CIDRs), TLS SANs, and the list of
#   built-in components to disable.
#
# Scope
#   The config file must exist BEFORE k3s.service starts for the first time.
#   If the cluster is already running and the file changes, the handler
#   "restart k3s" is notified. A restart causes a brief API server outage
#   (~10–20s on a lab VM); plan accordingly.
#   The kubeconfig generated by k3s lives at /etc/rancher/k3s/k3s.yaml
#   (copied to the user home by user_access.yml).
#
# Variables
#   k3s_node_name, k3s_node_ip, k3s_advertise_address, k3s_bind_address,
#   k3s_cluster_cidr, k3s_service_cidr, k3s_tls_san, k3s_flannel_backend,
#   k3s_disable, k3s_write_kubeconfig_mode (all from defaults/main.yml).
#
# Related commands
#   make install-k3s, make deploy, make up
# =============================================================================

- name: "k3s config | Ensure /etc/rancher/k3s/ exists"
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "k3s config | Write /etc/rancher/k3s/config.yaml"
  ansible.builtin.template:
    src: k3s-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
  notify: restart k3s
