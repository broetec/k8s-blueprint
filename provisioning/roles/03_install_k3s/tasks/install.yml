---
# =============================================================================
# tasks/install.yml — download installer, enable k3s, wait for Ready
# =============================================================================
#
# Purpose
#   Run the official get.k3s.io install script (skipped if the binary already
#   exists), enable k3s.service, then poll until the node reports Ready status
#   — confirming that the control plane and CNI are healthy.
#
# Scope
#   The install script is idempotent by design (guards on binary presence).
#   The wait loop retries for up to 10 minutes (60 × 10s); first boot with
#   image pulls can take 3–5 min on a cold lab VM.
#   k3s installs a single binary at /usr/local/bin/k3s and symlinks kubectl,
#   crictl, and ctr from the same path — no extra PATH change is needed for
#   kubectl itself, but KUBECONFIG must be set (handled by user_access.yml).
#
# Variables
#   k3s_install_url — install script URL (defaults/main.yml).
#   k3s_version     — passed as INSTALL_K3S_VERSION env var when non-empty.
#   k3s_channel     — passed as INSTALL_K3S_CHANNEL env var.
#   k3s_node_name   — node name used in the kubectl get node poll.
#
# Related commands
#   make install-k3s [K3S_VERSION=vX.Y.Z+k3sN], make deploy, make up
# =============================================================================

- name: "k3s install | Check if k3s binary already exists"
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: _k3s_binary

- name: "k3s install | Download and run install script"
  when: not _k3s_binary.stat.exists
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      curl -sfL {{ k3s_install_url }} | \
        {% if k3s_version | length > 0 %}INSTALL_K3S_VERSION="{{ k3s_version }}" {% endif %}\
        INSTALL_K3S_CHANNEL="{{ k3s_channel }}" \
        sh -
    executable: /bin/bash
  changed_when: true

- name: "k3s install | Enable and start k3s"
  ansible.builtin.systemd:
    name: k3s.service
    state: started
    enabled: true
    daemon_reload: true

- name: "k3s install | Wait for node to become Ready (up to 10 min)"
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - get
      - node
      - "{{ k3s_node_name }}"
      - --no-headers
      - -o
      - "custom-columns=STATUS:.status.conditions[-1].type"
  register: _k3s_node_status
  retries: 60
  delay: 10
  until: _k3s_node_status.stdout.strip() == "Ready"
  changed_when: false
  failed_when: _k3s_node_status.rc != 0 and _k3s_node_status.retries | default(0) >= 60
