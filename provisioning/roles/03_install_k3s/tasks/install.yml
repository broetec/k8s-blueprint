---
# =============================================================================
# install.yml — download installer, enable k3s, wait for node Ready
# =============================================================================

- name: "k3s install | Check if k3s binary already exists"
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: _k3s_binary

- name: "k3s install | Download and run install script"
  when: not _k3s_binary.stat.exists
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      curl -sfL {{ k3s_install_url }} | \
        {% if k3s_version | length > 0 %}INSTALL_K3S_VERSION="{{ k3s_version }}" {% endif %}\
        INSTALL_K3S_CHANNEL="{{ k3s_channel }}" \
        sh -
    executable: /bin/bash
  changed_when: true

- name: "k3s install | Enable and start k3s"
  ansible.builtin.systemd:
    name: k3s.service
    state: started
    enabled: true
    daemon_reload: true

- name: "k3s install | Wait for node to become Ready (up to 10 min)"
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - get
      - node
      - "{{ k3s_node_name }}"
      - --no-headers
      - -o
      - "custom-columns=STATUS:.status.conditions[-1].type"
  register: _k3s_node_status
  retries: 60
  delay: 10
  until: _k3s_node_status.stdout.strip() == "Ready"
  changed_when: false
  failed_when: _k3s_node_status.rc != 0 and _k3s_node_status.retries | default(0) >= 60
