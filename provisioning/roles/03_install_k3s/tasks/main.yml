---
# =============================================================================
# 03_install_k3s — main task orchestrator
# =============================================================================
# Pipeline:
#   1. preflight  — firewalld, NetworkManager, sysctl
#   2. config     — /etc/rancher/k3s/config.yaml
#   3. install    — download + enable k3s + wait Ready
#   4. user_access — kubeconfig, PATH, aliases in shell profile
# =============================================================================

- name: "k3s | Connectivity check"
  become: false
  ansible.builtin.ping:
  tags: [k3s_preflight]

- name: "k3s | System preflight (firewalld, NetworkManager, sysctl)"
  ansible.builtin.import_tasks: preflight.yml
  tags: [k3s_preflight]

- name: "k3s | Write config files"
  ansible.builtin.import_tasks: config.yml
  tags: [k3s_config]

- name: "k3s | Install and start k3s"
  ansible.builtin.import_tasks: install.yml
  tags: [k3s_install]

- name: "k3s | Configure user access (kubeconfig + shell)"
  become: false
  ansible.builtin.import_tasks: user_access.yml
  tags: [k3s_user]
