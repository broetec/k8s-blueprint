---
# =============================================================================
# config.yml — write RKE2 config.yaml and Cilium HelmChartConfig
# =============================================================================
# Must run BEFORE rke2-server starts for the first time.
# If the cluster is already running, changes here require a service restart
# (handled by handlers in install.yml via notify, or manually by the user).
# =============================================================================

- name: "RKE2 config | Ensure /etc/rancher/rke2/ exists"
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "RKE2 config | Write /etc/rancher/rke2/config.yaml"
  ansible.builtin.template:
    src: rke2-config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    owner: root
    group: root
    mode: "0600"
  notify: restart rke2-server

- name: "RKE2 config | Ensure /var/lib/rancher/rke2/server/manifests/ exists"
  ansible.builtin.file:
    path: /var/lib/rancher/rke2/server/manifests
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "RKE2 config | Write Cilium HelmChartConfig"
  when: rke2_cni == 'cilium'
  ansible.builtin.template:
    src: rke2-cilium-config.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/rke2-cilium-config.yaml
    owner: root
    group: root
    mode: "0644"
  notify: restart rke2-server
