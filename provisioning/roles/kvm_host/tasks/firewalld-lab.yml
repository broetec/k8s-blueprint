# -----------------------------------------------------------------------------
# Firewalld (Fedora/RHEL) — NAT e forward das VMs do lab
# -----------------------------------------------------------------------------
# Em hosts com Docker, a cadeia FORWARD fica com policy DROP e o tráfego das
# VMs (vnet* → wlan0) não sai sem estas regras. Sem firewalld activo, ignora.
# -----------------------------------------------------------------------------

- name: "Detectar se firewalld está activo no host KVM"
  ansible.builtin.command: systemctl is-active firewalld
  register: kvm_firewalld_active
  changed_when: false
  failed_when: false

- name: "Configurar firewalld para a rede NAT do lab"
  when: kvm_firewalld_active.stdout | trim == 'active'
  block:
    - name: "Remover bridge do lab da zona libvirt (evitar conflito com libvirt-routed)"
      ansible.posix.firewalld:
        interface: "{{ kvm_network.bridge }}"
        zone: libvirt
        permanent: true
        state: disabled
      failed_when: false

    - name: "Associar bridge {{ kvm_network.bridge }} à zona libvirt-routed"
      ansible.posix.firewalld:
        interface: "{{ kvm_network.bridge }}"
        zone: libvirt-routed
        permanent: true
        immediate: true
        state: enabled

    - name: "Masquerade na zona libvirt-routed (NAT das VMs)"
      ansible.posix.firewalld:
        zone: libvirt-routed
        masquerade: true
        permanent: true
        immediate: true
        state: enabled

    - name: "Verificar regra direct FORWARD (lab → exterior)"
      ansible.builtin.command: >-
        firewall-cmd --permanent
        --direct --passthrough ipv4
        -C FORWARD -s {{ kvm_network.subnet_cidr }} -j ACCEPT
      register: kvm_fw_fwd_lab_check
      changed_when: false
      failed_when: false

    - name: "Direct — permitir FORWARD do subnet do lab"
      ansible.builtin.command: >-
        firewall-cmd --permanent
        --direct --passthrough ipv4
        -I FORWARD 1 -s {{ kvm_network.subnet_cidr }} -j ACCEPT
      when: kvm_fw_fwd_lab_check.rc != 0

    - name: "Verificar regra direct FORWARD (established → lab)"
      ansible.builtin.command: >-
        firewall-cmd --permanent
        --direct --passthrough ipv4
        -C FORWARD -d {{ kvm_network.subnet_cidr }}
        -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
      register: kvm_fw_fwd_est_check
      changed_when: false
      failed_when: false

    - name: "Direct — FORWARD established para o lab"
      ansible.builtin.command: >-
        firewall-cmd --permanent
        --direct --passthrough ipv4
        -I FORWARD 1 -d {{ kvm_network.subnet_cidr }}
        -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
      when: kvm_fw_fwd_est_check.rc != 0

    - name: "Verificar regra direct NAT (masquerade do lab)"
      ansible.builtin.command: >-
        firewall-cmd --permanent
        --direct --passthrough ipv4
        -t nat -C POSTROUTING -s {{ kvm_network.subnet_cidr }}
        ! -d {{ kvm_network.subnet_cidr }} -j MASQUERADE
      register: kvm_fw_nat_check
      changed_when: false
      failed_when: false

    - name: "Direct — NAT POSTROUTING para o subnet do lab"
      ansible.builtin.command: >-
        firewall-cmd --permanent
        --direct --passthrough ipv4
        -t nat -A POSTROUTING -s {{ kvm_network.subnet_cidr }}
        ! -d {{ kvm_network.subnet_cidr }} -j MASQUERADE
      when: kvm_fw_nat_check.rc != 0

    - name: "Recarregar firewalld após regras do lab"
      ansible.builtin.command: firewall-cmd --reload
      changed_when: true
