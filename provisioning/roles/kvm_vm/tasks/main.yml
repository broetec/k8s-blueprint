---
# =============================================================================
# roles/kvm_vm/tasks/main.yml
# =============================================================================
# Provisiona VMs no KVM/libvirt iterando sobre `groups['vms']` do inventário.
#
# Pré-requisitos:
#   - `virsh`, `virt-install`, `qemu-img` e `genisoimage` ou `xorriso` no PATH
#     (a etapa 1 abaixo cuida disso quando `kvm_host_bootstrap: true`).
#   - Apenas `ansible-core` no controller — não é necessário instalar a
#     coleção `community.libvirt` nem o binding `libvirt-python` (que exige
#     `libvirt-devel` no host para compilar). Tudo é feito via `virsh`.
#
# Etapas:
#   1. Pré-requisitos no host KVM (pacotes + libvirtd ativo).
#   2. Rede libvirt 10.20.30.0/24 + reservas DHCP (MAC -> vm_ip no dnsmasq).
#   3. Baixar a imagem qcow2 do Rocky Linux uma única vez (lab/cache).
#   4. Para cada VM ainda inexistente:
#        a. clonar a qcow2 base e redimensionar o disco;
#        b. renderizar `user-data` + `meta-data`;
#        c. gerar o seed ISO (NoCloud datasource);
#        d. criar a VM via `virt-install --import --noautoconsole`.
#   5. Aguardar o SSH responder em cada VM.
# =============================================================================

# ---------- 1. Pré-requisitos no host KVM ------------------------------------
# Esta etapa é OPCIONAL: em distros imutáveis (Bazzite, Silverblue, Kinoite) ou
# em hosts onde KVM já está configurado, defina `kvm_host_bootstrap: false` no
# inventário (ou rode com `--skip-tags bootstrap`) para pular a instalação de
# pacotes e o gerenciamento do serviço libvirtd.
- name: "Instalar dependências de KVM/libvirt no host"
  ansible.builtin.package:
    name:
      - qemu-kvm
      - libvirt
      - libvirt-client
      - virt-install
      - libguestfs-tools
      - genisoimage
      - xorriso
    state: present
  when: kvm_host_bootstrap | default(true) | bool
  tags: [bootstrap, install]

- name: "Garantir libvirtd ativo e habilitado no boot"
  ansible.builtin.service:
    name: libvirtd
    state: started
    enabled: true
  when: kvm_host_bootstrap | default(true) | bool
  tags: [bootstrap, install]

# ---------- 1.5. Preflight do controller -------------------------------------
# Falha cedo (antes de baixar qcow2 ou criar VM) se algo essencial estiver
# faltando no controller — economiza tempo e bandwidth.
- name: "Preflight: chave SSH pública configurada existe?"
  ansible.builtin.stat:
    path: "{{ ssh_public_key_path }}"
  register: ssh_pubkey_stat
  check_mode: false

- name: "Falhar com mensagem clara se a chave SSH pública não existir"
  ansible.builtin.fail:
    msg: |-
      Chave SSH pública não encontrada em: {{ ssh_public_key_path }}

      Solução A — na raiz do repositório (recomendado):
        make keys

      Solução B — gerar manualmente no repositório:
        ssh-keygen -t ed25519 -C "k8s-blueprint" -f env/k8s-blueprint -N ""

      Solução C — apontar para uma chave existente, sobrescrevendo
      `ssh_public_key_path` no seu inventário (ex.: group_vars/all.yml):
        ssh_public_key_path: "{{ '{{' }} lookup('env', 'HOME') ~ '/.ssh/id_rsa.pub' {{ '}}' }}"
  when: not ssh_pubkey_stat.stat.exists


- name: "Definir MAC estável por VM (virt-install + reserva DHCP dnsmasq)"
  ansible.builtin.set_fact:
    kvm_vm_mac_by_host: "{{ kvm_vm_mac_by_host | default({}) | combine({ item: _vm_mac }) }}"
  vars:
    _vm_mac: >-
      {{ hostvars[item].vm_mac | default(
           '52:54:00:' ~ (item | hash('md5'))[0:2] ~ ':' ~
           (item | hash('md5'))[2:4] ~ ':' ~ (item | hash('md5'))[4:6]
         ) }}
  loop: "{{ groups['vms'] }}"
  loop_control:
    label: "{{ item }}"

# ---------- 2. Rede libvirt (subrede 10.20.30.0/24) — net-define precisa do <uuid>
#    se a rede com o mesmo nome já existir.
#
#    Importante: NUNCA fazer net-destroy + net-start em cada execução do playbook
#    se o XML persistente já for o desejado — isso derruba o bridge com VMs a
#    correr e corta rede/DHCP (ex.: 2.º `make up` com VMs já criadas). Só
#    reiniciamos o runtime quando o fingerprint (NAT/bridge/DHCP/reservas)
#    mudou ou quando `kvm_network_force_restart` está a true. Comparação
#    normaliza aspas no XML (virsh vs template). Se nada mudou, nem
#    `virsh net-define` corre (evita efeitos secundários em rede activa).
- name: "Listar redes libvirt ativas (estado inicial, antes de net-define)"
  ansible.builtin.command: virsh -c qemu:///system net-list --name
  register: libvirt_active_nets_initial
  changed_when: false
  check_mode: false

- name: "Obter UUID da rede {{ kvm_network.name }} (se já estiver definida)"
  ansible.builtin.shell: |
    set -euo pipefail
    virsh -c qemu:///system net-info "{{ kvm_network.name }}" 2>/dev/null | awk '/^UUID:/ { print $2 }'
  args:
    executable: /bin/bash
  register: kvm_network_uuid_lookup
  changed_when: false
  failed_when: false

- name: "Definir XML da rede libvirt {{ kvm_network.name }}"
  ansible.builtin.copy:
    dest: "/tmp/libvirt-net-{{ kvm_network.name }}.xml"
    mode: "0644"
    content: |
      <network>
        {% if kvm_network_uuid_lookup.stdout | trim | length > 0 %}
        <uuid>{{ kvm_network_uuid_lookup.stdout | trim }}</uuid>
        {% endif %}
        <name>{{ kvm_network.name }}</name>
        <forward mode='nat'/>
        <bridge name='{{ kvm_network.bridge }}' stp='on' delay='0'/>
        <domain name='{{ kvm_network.domain }}' localOnly='yes'/>
        <ip address='{{ kvm_network.gateway }}' netmask='{{ kvm_network.netmask }}'>
          <dhcp>
            <range start='{{ kvm_network.dhcp_start }}' end='{{ kvm_network.dhcp_end }}'/>
            {% for vm in groups['vms'] %}
            <host mac='{{ kvm_vm_mac_by_host[vm] }}' ip='{{ hostvars[vm].vm_ip }}'/>
            {% endfor %}
          </dhcp>
        </ip>
      </network>

- name: "Fingerprint do XML da rede (ficheiro alvo em /tmp)"
  ansible.builtin.shell: |-
    {% raw %}
    set -euo pipefail
    f="/tmp/libvirt-net-${KVM_NET_NAME}.xml"
    _fp_stream() {
      sed "s/\"/'/g" | {
        grep -oE "<forward[^/>]*/>" || true
        grep -oE "<bridge[^/>]*/>" || true
        grep -oE "<domain[^/>]*/>" || true
        grep -oE "<ip address='[^']+' netmask='[^']+'>" || true
        grep -oE "<range start='[^']+' end='[^']+'/>" || true
        grep -oE "<host mac='[^']+' ip='[^']+'/>" | LC_ALL=C sort || true
      } | sha256sum | awk '{print $1}'
    }
    _fp_stream < "$f"
    {% endraw %}
  environment:
    KVM_NET_NAME: "{{ kvm_network.name }}"
  args:
    executable: /bin/bash
  register: kvm_net_fp_wanted
  changed_when: false

- name: "Fingerprint do XML persistente actual (antes de net-define)"
  ansible.builtin.shell: |-
    {% raw %}
    set -euo pipefail
    name="${KVM_NET_NAME}"
    if ! virsh -c qemu:///system net-info "$name" &>/dev/null; then
      echo "__NETWORK_ABSENT__"
      exit 0
    fi
    _fp_stream() {
      sed "s/\"/'/g" | {
        grep -oE "<forward[^/>]*/>" || true
        grep -oE "<bridge[^/>]*/>" || true
        grep -oE "<domain[^/>]*/>" || true
        grep -oE "<ip address='[^']+' netmask='[^']+'>" || true
        grep -oE "<range start='[^']+' end='[^']+'/>" || true
        grep -oE "<host mac='[^']+' ip='[^']+'/>" | LC_ALL=C sort || true
      } | sha256sum | awk '{print $1}'
    }
    virsh -c qemu:///system net-dumpxml --inactive "$name" | _fp_stream
    {% endraw %}
  environment:
    KVM_NET_NAME: "{{ kvm_network.name }}"
  args:
    executable: /bin/bash
  register: kvm_net_fp_current
  changed_when: false

- name: "Calcular se o runtime dnsmasq precisa de alinhar ao XML (mudou ou forçar)"
  ansible.builtin.set_fact:
    kvm_libvirt_net_runtime_needs_refresh: >-
      {{
        (kvm_net_fp_wanted.stdout | trim != kvm_net_fp_current.stdout | trim)
        or (kvm_network_force_restart | default(false) | bool)
      }}

- name: "Definir ou atualizar rede libvirt (persistente; só se XML lógico mudou ou rede nova)"
  ansible.builtin.command: >-
    virsh -c qemu:///system net-define
    /tmp/libvirt-net-{{ kvm_network.name }}.xml
  when: >-
    (kvm_net_fp_current.stdout | trim == "__NETWORK_ABSENT__")
    or (kvm_net_fp_wanted.stdout | trim != kvm_net_fp_current.stdout | trim)

- name: "Marcar a rede libvirt como autostart"
  ansible.builtin.command: virsh -c qemu:///system net-autostart {{ kvm_network.name }}
  changed_when: false

- name: "Iniciar a rede libvirt se ainda não estiver ativa"
  ansible.builtin.command: virsh -c qemu:///system net-start {{ kvm_network.name }}
  when: kvm_network.name not in libvirt_active_nets_initial.stdout_lines

- name: "Reiniciar rede {{ kvm_network.name }} (só se XML/reservas mudaram ou forçado)"
  ansible.builtin.shell: |
    set -euo pipefail
    virsh -c qemu:///system net-destroy "{{ kvm_network.name }}" 2>/dev/null || true
    virsh -c qemu:///system net-start "{{ kvm_network.name }}"
  args:
    executable: /bin/bash
  when:
    - kvm_network.name in libvirt_active_nets_initial.stdout_lines
    - kvm_libvirt_net_runtime_needs_refresh | bool

# ---------- 3. Imagem base do Rocky Linux (cache) ----------------------------
- name: "Garantir diretórios do lab libvirt (discos + cache no repositório)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ libvirt_pool.path }}"
    - "{{ os_image.cache_dir }}"
  # Operação idempotente e segura: criamos mesmo em --check para que as
  # tasks subsequentes (get_url, copy) não quebrem com "destination does
  # not exist" em dry-run.
  check_mode: false

- name: "SELinux: contexto virt_image_t em lab/ (paths no repositório)"
  ansible.builtin.command:
    argv:
      - chcon
      - -R
      - -t
      - virt_image_t
      - "{{ libvirt_pool.path }}"
      - "{{ os_image.cache_dir }}"
  when:
    - ansible_facts.get('selinux', {}).get('status', 'disabled') == 'enabled'
    - libvirt_pool.path.startswith(_repo_root)
  changed_when: true

- name: "Baixar a imagem qcow2 do Rocky Linux (uma única vez)"
  ansible.builtin.get_url:
    url: "{{ os_image.url }}"
    dest: "{{ os_image.cache_dir }}/{{ os_image.filename }}"
    mode: "0644"
    force: false

# ---------- 4. Provisionar cada VM do inventário -----------------------------
- name: "Verificar quais VMs já existem no libvirt"
  ansible.builtin.command: "virsh -c qemu:///system dominfo {{ item }}"
  register: virsh_dominfo
  loop: "{{ groups['vms'] }}"
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Calcular conjunto de VMs ainda a criar"
  ansible.builtin.set_fact:
    vms_to_create: >-
      {{ groups['vms']
         | difference(
             virsh_dominfo.results
             | selectattr('rc', 'equalto', 0)
             | map(attribute='item')
             | list
           )
      }}

- name: "Clonar a imagem base para o disco de cada VM nova"
  ansible.builtin.copy:
    src: "{{ os_image.cache_dir }}/{{ os_image.filename }}"
    dest: "{{ libvirt_pool.path }}/{{ item }}.qcow2"
    remote_src: true
    force: false
    mode: "0644"
  loop: "{{ vms_to_create }}"
  loop_control:
    label: "{{ item }}"

- name: "Redimensionar o disco de cada VM nova"
  ansible.builtin.command: >-
    qemu-img resize
    {{ libvirt_pool.path }}/{{ item }}.qcow2
    {{ hostvars[item].vm_disk_size_gb | default(vm_defaults.disk_size_gb) }}G
  loop: "{{ vms_to_create }}"
  loop_control:
    label: "{{ item }}"
  changed_when: true

- name: "Criar diretório temporário para artefatos do cloud-init"
  ansible.builtin.tempfile:
    state: directory
    suffix: "ci-{{ item }}"
  loop: "{{ vms_to_create }}"
  register: ci_tmpdirs
  loop_control:
    label: "{{ item }}"

- name: "Renderizar user-data por VM (cloud-init)"
  ansible.builtin.template:
    src: cloud-init.j2
    dest: "{{ item.path }}/user-data"
    mode: "0644"
  vars:
    vm_hostname: "{{ item.item }}"
    vm_ip: "{{ hostvars[item.item].vm_ip }}"
  loop: "{{ ci_tmpdirs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: "Gerar meta-data por VM"
  ansible.builtin.copy:
    dest: "{{ item.path }}/meta-data"
    mode: "0644"
    content: |
      instance-id: {{ item.item }}-{{ ansible_date_time.epoch }}
      local-hostname: {{ item.item }}.{{ base_domain }}
  loop: "{{ ci_tmpdirs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: "Gerar seed ISO do cloud-init por VM"
  ansible.builtin.shell: |
    set -euo pipefail
    out="{{ libvirt_pool.path }}/{{ item.item }}-seed.iso"
    u="{{ item.path }}/user-data"
    m="{{ item.path }}/meta-data"
    if command -v genisoimage >/dev/null 2>&1; then
      genisoimage -output "$out" -volid cidata -joliet -rock "$u" "$m"
    elif command -v xorriso >/dev/null 2>&1; then
      xorriso -as mkisofs -o "$out" -V cidata -joliet -rock "$u" "$m"
    else
      echo "Falta genisoimage ou xorriso no PATH (instale um dos pacotes ou rode o playbook com a tag bootstrap)." >&2
      exit 1
    fi
  args:
    # Sem `creates`: senão alterações a user-data não entram na VM.
    executable: /bin/bash
  loop: "{{ ci_tmpdirs.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: "Preflight: virt-install no PATH do host KVM?"
  ansible.builtin.command: command -v virt-install
  changed_when: false
  failed_when: false
  register: virt_install_lookup

- name: "Falhar se virt-install não estiver instalado"
  ansible.builtin.fail:
    msg: |-
      O comando `virt-install` não foi encontrado no host que corre o libvirt.

      • Fedora/RHEL (dnf): instale `virt-install` e dependências — ou `make up ANSIBLE_FLAGS=`
        para o playbook instalar a tag `bootstrap`.
      • Bazzite/Silverblue/immutable: não use dnf; instale em camada com `rpm-ostree`
        (lista em provisioning/README.md, secção «Fedora Atomic / Bazzite») e reinicie.
  when: virt_install_lookup.rc != 0

- name: "Definir e iniciar cada VM via virt-install"
  ansible.builtin.command: >-
    virt-install
    --connect qemu:///system
    --name {{ item }}
    --memory {{ hostvars[item].vm_memory_mb | default(vm_defaults.memory_mb) }}
    --vcpus {{ hostvars[item].vm_vcpus | default(vm_defaults.vcpus) }}
    --os-variant {{ vm_defaults.os_variant }}
    --disk path={{ libvirt_pool.path }}/{{ item }}.qcow2,format=qcow2,bus=virtio
    --disk path={{ libvirt_pool.path }}/{{ item }}-seed.iso,device=cdrom
    --network network={{ kvm_network.name }},model={{ vm_defaults.network_iface_model }},mac={{ kvm_vm_mac_by_host[item] }}
    --graphics none
    --noautoconsole
    --import
  loop: "{{ vms_to_create }}"
  loop_control:
    label: "{{ item }}"
  register: virt_install
  changed_when: virt_install.rc == 0

- name: "Verificar MAC da VM vs reserva DHCP no dnsmasq"
  ansible.builtin.command: virsh -c qemu:///system dumpxml {{ item }}
  loop: "{{ vms_to_create }}"
  loop_control:
    label: "{{ item }}"
  register: domif_out
  changed_when: false
  when: vms_to_create | length > 0

- name: "MAC da NIC deve coincidir com kvm_vm_mac_by_host"
  ansible.builtin.assert:
    that:
      - kvm_vm_mac_by_host[item.item] | lower in item.stdout | lower
    fail_msg: |-
      O MAC da VM '{{ item.item }}' não coincide com o esperado ({{ kvm_vm_mac_by_host[item.item] }}).
      Domínios criados antes da reserva por MAC mantêm outro endereço → DHCP na gama .100–.200 (ex.: .118).
      Correção: make destroy && make up
  loop: "{{ domif_out.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: vms_to_create | length > 0

# ---------- 5. Esperar SSH responder em cada VM ------------------------------
- name: "Aguardar o SSH responder em cada VM (cloud-init concluído)"
  ansible.builtin.wait_for:
    host: "{{ hostvars[item].vm_ip }}"
    port: 22
    state: started
    delay: 10
    timeout: 600
  loop: "{{ groups['vms'] }}"
  loop_control:
    label: "{{ item }}"
