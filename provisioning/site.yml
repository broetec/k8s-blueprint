---
# =============================================================================
# site.yml — Playbook mestre (Broetec k8s-blueprint)
# =============================================================================
# Pipeline 00–04 (uma role por play):
#
#   00_install_kvm  -> kvm_hosts: bootstrap, rede libvirt, firewall (opt-in)
#   01_create_vm    -> kvm_hosts: qcow2, cloud-init, virt-install
#   02_prepare_vm   -> vms: swap, SELinux, firewalld
#   03_install_rke2   -> vms: RKE2 (stub)
#   04_deploy_k8s     -> vms: manifests k8s (stub)
#
#   make setup-host   → 00
#   make up           → 01 + 02 + 03 + 04
# =============================================================================

- name: "[1/5] Preparar host KVM/libvirt"
  hosts: kvm_hosts
  become: true
  gather_facts: true
  tags:
    - install_kvm
  roles:
    - role: 00_install_kvm

- name: "[2/5] Criar VMs no libvirt"
  hosts: kvm_hosts
  become: true
  gather_facts: true
  tags:
    - create_vm
  roles:
    - role: 01_create_vm

- name: "[3/5] Preparar SO das VMs"
  hosts: vms
  become: true
  gather_facts: false
  tags:
    - prepare_vm
  pre_tasks:
    - name: "Limpar entrada SSH obsoleta no controlador (ssh-keygen -R)"
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -R
          - "{{ hostvars[item].ansible_host | default(hostvars[item].vm_ip) }}"
          - -f
          - "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
      loop: "{{ groups['vms'] }}"
      loop_control:
        label: "{{ hostvars[item].ansible_host | default(hostvars[item].vm_ip) }}"
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
  roles:
    - role: 02_prepare_vm

- name: "[4/5] Instalar RKE2 (stub)"
  hosts: vms
  become: true
  gather_facts: false
  tags:
    - install_rke2
    - k8s
  roles:
    - role: 03_install_rke2

- name: "[5/5] Deploy manifests k8s (stub)"
  hosts: vms
  become: true
  gather_facts: false
  tags:
    - deploy_k8s
    - k8s
  roles:
    - role: 04_deploy_k8s
