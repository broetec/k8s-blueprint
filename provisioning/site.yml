---
# =============================================================================
# site.yml — Master playbook (Broetec k8s-blueprint)
# =============================================================================
#
# Purpose
#   Five plays (roles 00–04): KVM host prep, VM creation, guest OS prep, RKE2, k8s.
#
# Pipeline
#   Play | Hosts     | Role            | Tag(s)              | Make target
#   -----|-----------|-----------------|---------------------|------------------
#   1/5  | kvm_hosts | 00_install_kvm  | install_kvm         | make setup-host
#   2/5  | kvm_hosts | 01_create_vm    | create_vm           | make create-vm, make up
#   3/5  | vms       | 02_prepare_vm   | prepare_vm          | make prepare-vm, make up
#   4/5  | vms       | 03_install_rke2 | install_rke2, install_k8s, k8s | make install-rke2 / make install-k3s
#   5/5  | vms       | 04_deploy_k8s   | deploy_k8s, k8s     | make deploy-k8s, make up
#
#   make up runs plays 2–5 (not play 1). make deploy = install-k8s (K8S_DISTRIBUTION) + deploy-k8s.
#
# Pre-task (play 3 only)
#   ssh-keygen -R on localhost when ansible_prune_ssh_known_hosts=true.
#   Default false via make/ansible.mk (ANSIBLE_PRUNE_SSH_KNOWN_HOSTS).
#
# gather_facts
#   true on kvm_hosts plays; false on vms plays (libssh stability, faster SSH runs).
#
# Tags
#   bootstrap — host package install (role 00); skip with --skip-tags bootstrap or
#               KVM_HOST_BOOTSTRAP=false in env/.env.
#   k8s       — plays 4–5 (stubs today).
#
# Examples
#   make setup-host OVERLAY=broetec-core
#   uv run ansible-playbook -i provisioning/inventory/broetec-core/hosts.ini \
#     provisioning/site.yml --tags create_vm --limit kvm_hosts
#   uv run ansible-playbook ... --skip-tags bootstrap --tags install_kvm
#
# Related
#   provisioning/ansible.cfg, provisioning/README.md, roles/*/README.md
# =============================================================================

- name: "[1/5] Prepare KVM/libvirt host"
  hosts: kvm_hosts
  become: false
  gather_facts: true
  tags:
    - install_kvm
  roles:
    - role: 00_install_kvm

- name: "[2/5] Create libvirt VMs"
  hosts: kvm_hosts
  become: false
  gather_facts: true
  tags:
    - create_vm
  roles:
    - role: 01_create_vm

- name: "[3/5] Prepare guest OS"
  hosts: vms
  become: true
  gather_facts: false
  tags:
    - prepare_vm
  pre_tasks:
    - name: "Remove stale SSH known_hosts entry on controller (ssh-keygen -R)"
      when: ansible_prune_ssh_known_hosts | default(false) | bool
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -R
          - "{{ hostvars[item].ansible_host | default(hostvars[item].vm_ip) }}"
          - -f
          - "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
      loop: "{{ groups['vms'] }}"
      loop_control:
        label: "{{ hostvars[item].ansible_host | default(hostvars[item].vm_ip) }}"
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
  roles:
    - role: 02_prepare_vm

- name: "[4/5] Install Kubernetes ({{ k8s_distribution | default('rke2') }})"
  hosts: vms
  become: true
  gather_facts: false
  tags:
    - install_rke2
    - install_k8s
    - k8s
  tasks:
    - name: "Install RKE2"
      ansible.builtin.include_role:
        name: 03_install_rke2
      when: (k8s_distribution | default('rke2')) == 'rke2'

    - name: "Install k3s"
      ansible.builtin.include_role:
        name: 03_install_k3s
      when: (k8s_distribution | default('rke2')) == 'k3s'

- name: "[5/5] Deploy k8s manifests (stub)"
  hosts: vms
  become: true
  gather_facts: false
  tags:
    - deploy_k8s
    - k8s
  roles:
    - role: 04_deploy_k8s
