---
# =============================================================================
# site.yml — Playbook mestre (Broetec k8s-blueprint)
# =============================================================================
# Orquestra a fase IMPERATIVA do blueprint, em duas etapas:
#
#   1. kvm_vm     -> roda no host físico (kvm_hosts).
#                    Garante a rede libvirt 10.20.30.0/24, baixa a imagem
#                    qcow2 do Rocky Linux, gera o seed ISO de cloud-init
#                    e cria cada VM definida no inventário.
#
#   2. os_prepare -> roda dentro de cada VM (grupo `vms`) via SSH.
#                    Aplica preparações básicas de SO (swap, SELinux,
#                    firewalld) que serão pré-requisito para etapas
#                    posteriores.
#
# Execução (na raiz do repo, com .venv via uv):
#   uv run ansible-playbook -i provisioning/inventory/example/hosts.ini provisioning/site.yml
#   make up
# =============================================================================

- name: "[1/2] Provisionar VMs no KVM/libvirt"
  hosts: kvm_hosts
  become: true
  gather_facts: true
  tags:
    - kvm_lab
  roles:
    - role: kvm_vm

- name: "[2/2] Preparar o sistema operacional das VMs"
  hosts: vms
  become: true
  # Setup completo por SSH rebenta workers fracos (Cursor/AppImage); a role usa facts mínimos.
  gather_facts: false
  tags:
    - os_prepare
  pre_tasks:
    # Recriar a VM altera a chave do host; limpa entradas antigas para SSH manual / ssh-keyscan.
    - name: "Limpar entrada SSH obsoleta no controlador (ssh-keygen -R)"
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -R
          - "{{ hostvars[item].ansible_host | default(hostvars[item].vm_ip) }}"
      loop: "{{ groups['vms'] }}"
      loop_control:
        label: "{{ hostvars[item].ansible_host | default(hostvars[item].vm_ip) }}"
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
  roles:
    - role: os_prepare
