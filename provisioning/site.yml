---
# =============================================================================
# site.yml — Playbook mestre (Broetec k8s-blueprint)
# =============================================================================
# Orquestra a fase IMPERATIVA do blueprint:
#
#   1. 00_install_kvm -> host físico (kvm_hosts): bootstrap opcional, rede libvirt,
#                        firewalld/NAT.
#   2. 01_create_vm   -> host físico: qcow2, cloud-init, virt-install, wait SSH.
#   3. 02_prepare_vm  -> dentro de cada VM (grupo `vms`): swap, SELinux, firewalld.
#
# Execução (na raiz do repo, com .venv via uv):
#   uv run ansible-playbook -i provisioning/inventory/broetec-core/hosts.ini provisioning/site.yml
#   make up
# =============================================================================

- name: "[1/2] Provisionar VMs no KVM/libvirt"
  hosts: kvm_hosts
  become: true
  gather_facts: true
  tags:
    - kvm_lab
  roles:
    - role: 00_install_kvm
    - role: 01_create_vm

- name: "[2/2] Preparar o sistema operacional das VMs"
  hosts: vms
  become: true
  # Setup completo por SSH rebenta workers fracos (Cursor/AppImage); a role usa facts mínimos.
  gather_facts: false
  tags:
    - os_prepare
  pre_tasks:
    # Controlador: só $HOME/.ssh/known_hosts (make ssh-host-key-*). Sem /etc/ssh.
    - name: "Limpar entrada SSH obsoleta no controlador (ssh-keygen -R)"
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -R
          - "{{ hostvars[item].ansible_host | default(hostvars[item].vm_ip) }}"
          - -f
          - "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
      loop: "{{ groups['vms'] }}"
      loop_control:
        label: "{{ hostvars[item].ansible_host | default(hostvars[item].vm_ip) }}"
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
  roles:
    - role: 02_prepare_vm
